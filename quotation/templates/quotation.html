<style>
/* body */
.quatation_projects {
    padding: 2rem;
}

/* top bar */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.top-bar input {
    width: 250px;
}


/* Projects */
.card{
    width: 18rem;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
    background: white;
    transition: 0.3s;
    /* border: 1px solid black; */
}

.card:hover {
    transform: translateY(-3px);
}

.card .container {
    padding: 1rem;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.cards{
    display: grid;
    grid-template-columns: repeat(auto-fill, 18rem);
    justify-content: start;
    gap: 2rem;
    margin-top: 2rem;
    align-items: start;
}

.quotation_projects .card .container p {
    max-height: 150px;
    overflow: scroll;
    padding-left: 20px;
    min-height: auto;
}

.add_new_project_center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 2rem;
    width: 40px;
    height: 40px;
    line-height: 40px;
    text-align: center;
    border-radius: 50%;
    transition: background 0.2s, color 0.2s;
}

.add_new_project_center:hover {
    background: #172121;
    color: #A9E5BB;
    cursor: pointer;
}

.delete_project_bottom_left {
    position: absolute;
    bottom: -120px;
    left: 16px;
    font-size: 1rem;
    width: 40px;
    height: 40px;
    color: white;
    line-height: 40px;
    text-align: center;
    border-radius: 50%;
    transition: background 0.2s, color 0.2s;
}

.delete_project_bottom_left:hover {
    background: #172121;
    color: #bb0a21;
    cursor: pointer;
}
</style>

<div class="quotation_projects">

    <div class="top-bar">
        <input type="text" id="search" placeholder="Search">
    </div>

    <div class="cards">
        {% load static %}

        {% for i in projects %}
            <div class="card project-card" data-name="{{ i.name|lower }}">
                <a href="{% url 'individual_quotation' i.id %}" style="position: relative;">
                    <img src="{% static 'quotation/images/wall.jpeg' %}" alt="">

                    <div class="delete_project_bottom_left" onclick="event.stopPropagation(); event.preventDefault();
                        if(confirm('Are you sure you want to delete this project?')) deleteProject({{ i.id }});">
                        <span>X</span>
                    </div>
                </a>
                
                <div class="container">
                    <details>
                        <summary><b>{{ i.name }}</b></summary>
                        <p>{{ i.details }}</p>
                    </details>
                </div>
            </div>
        {% endfor %}
        
        <div class="card">
            <div class="add_new_project" style="position: relative;">
                <img src="{% static 'quotation/images/wall.jpeg' %}" alt="">

                <div class="add_new_project_center" onclick="addProject()">
                    <span>+</span>
                </div>
            </div>
            <div class="container"><summary><b>Add Project</b></summary></div>
        </div> 
    </div>

    <!-- <div class="more">

        [...]
    </div> -->

    
</div>
