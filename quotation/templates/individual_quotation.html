<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Individual Quotation</title>
</head>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    .target_info{
        display: flex;
        justify-content: left;
        align-items: center;
        gap: 2rem;
    }

    .top_bar{
        padding: 2rem;
    }
    
    .top_bar_project_info{
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .top_bar_target_info{
           padding-left: 1rem;
    }

    .indirect_cost-bar{
        display: flex;
        justify-content: left;
        align-items: center;
        gap: 2rem;
        padding: 1rem;
    }

    .individual_quotation_table{
        margin: 2rem;
    }

</style>
<body>
    
    <form action="">

        <div class="top_bar">
            <div class="top_bar_project_info">
                <h1 contenteditable="True">{{ project.name }}</h1> 
                <button type="button">help</button>
            </div>

            <div class="top_bar_target_info" style="display: flex; gap: 0.5rem;">
                <label for="customer_name">Client:</label>
                <p contenteditable="True">{{ project.client_name }}</p>
            </div>
            
            <span>
                <details open>
                    <summary >Project Details</summary>
                    <p contenteditable="true">{{ project.details }}</p>
                </details>
            </span>

        </div>

        
        <span style="display: flex; gap: 0.5rem; padding: 1rem;">
            <b>subtotal:</b> <p id="subtotal"></p>
        </span>
            <details open>
                <summary>View Details</summary>
                <p style="white-space: pre;" id="subtotal_details"></p>
            </details>

        <div class="indirect_cost-bar">
            <p>overhead: <input type="number" id="overhead" value="10"> %</p>
            <p>margin:<input type="number" id="margin" value="30"> %</p>
            <p>tax: <input type="number" id="tax" value="10"> %</p>
        </div>


            
            <div class="individual_quotation_table">
                <table>
                    <tr>
                        <th>Item Name</th>
                        <th>Quantity</th>
                        <th>Unit Cost</th>
                        <th>Autocost</th>
                        <th></th>
                    </tr>
                   {% for item in project.items.all %}
                        <tr>
                            <td id="item_name" contenteditable="True">{{ item.item_name }}</td>
                            <td><input type="number" class="qty" value="{{ item.quantity }}"></td>
                            <td><input type="number" class="cost" value="{{ item.unit_cost }}"></td>
                            <td class="autocost" contenteditable="False"></td>
                            <td><button type="button">delete</button></td>
                        </tr>
                    {% endfor %}
                   
                    
                </table>
                <button type="button">add</button>
            </div>

            <button type="submit">Export</button>
            
        </form>
    
</body>

<!-- script for autocalculation when numbers change (client side)-->
<script src="/static/client_side_autocompute.js"></script>

<!-- script -->
</html>
