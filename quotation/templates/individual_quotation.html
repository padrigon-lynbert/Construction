<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Individual Quotation</title>
</head>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    .target_info{
        display: flex;
        justify-content: left;
        align-items: center;
        gap: 2rem;
    }

    .top_bar{
        padding: 2rem;
    }
    
    .top_bar_project_info{
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .top_bar_target_info{
           padding-left: 1rem;
    }

    .indirect_cost-bar{
        display: flex;
        justify-content: left;
        align-items: center;
        gap: 2rem;
        padding: 1rem;
    }

    .individual_quotation_table{
        margin: 2rem;
    }

    /* hide input */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    input[type=number] {
        -moz-appearance: textfield;
    }

    /* remove box when inputting data */
details p.selected_cell,
.indirect_cost-bar input.selected_cell {
    border: none;
    outline: none;
    background: transparent;
    font: inherit;
}

</style>
<body>
    
    <form action="">

        <div class="top_bar">
            <div class="top_bar_project_info">
                <h1 class="selected_cell" contenteditable="true" tabindex="0" data-field="name" data-id="{{ project.id }}">{{ project.name }}</h1> 
                <button type="button">help</button>
            </div>

            <div class="top_bar_target_info" style="display: flex; gap: 0.5rem;">
                <label for="customer_name">Client:</label>
                <p class="selected_cell" contenteditable="True" tabindex="0" data-field="client_name" data-id="{{ project.id }}">{{ project.client_name }}</p>
            </div>
            
            <span>
                <details open>
                    <summary>Project Details</summary>
                    <p class="selected_cell" contenteditable="true" tabindex="0" data-field="details" data-id="{{ project.id }}">{{ project.details }}</p>
                </details>
            </span>

        </div>

        
        <span style="display: flex; gap: 0.5rem; padding: 1rem;">
            <b>subtotal:</b> <p id="subtotal"></p>
        </span>
            <details open>
                <summary>View Details</summary>
                <p style="white-space: pre;" id="subtotal_details"></p>
            </details>

        <div class="indirect_cost-bar">
            <p><b>Indirect Costs (%)</b></p>
            <p>overhead: <input type="number" class="selected_cell" id="overhead" data-field="overhead" data-id="{{ project.id }}" value="{{ project.overhead }}" style="width: 8ch;"
                oninput="this.value = this.value.replace(/[^0-9.]/g,'')" style="width: 8ch;"></p>
            <p>margin: <input class="selected_cell" type="number" id="margin" data-field="margin" value="{{ project.margin }}" style="width: 8ch;"
                oninput="this.value = this.value.replace(/[^0-9.]/g,'')" style="width: 8ch;"></p>
            <p>tax: <input class="selected_cell" type="number" id="tax" data-field="tax" data-id="{{ project.id }}" value="{{ project.tax }}" tabindex="0"
                oninput="this.value = this.value.replace(/[^0-9.]/g,'')" style="width: 8ch;"></p>
        </div>


            
            <div class="individual_quotation_table">
                <table>
                    <tr>
                        <th>Item Name</th>
                        <th>Quantity</th>
                        <th>Unit Cost</th>
                        <th>Autocost</th>
                        <th></th>
                    </tr>
                   {% for item in project.items.all %}
                        <tr data-id="{{ item.id }}">
                            <td class="table_edit_item" contenteditable="True" data-field="item_name">{{ item.item_name }}</td>
                            <td><input type="number" class="table_edit_item qty" data-field="quantity" value="{{ item.quantity }}"></td>
                            <td><input type="number" class="table_edit_item cost" data-field="unit_cost" value="{{ item.unit_cost }}"></td>
                            <td class="autocost" contenteditable="False"></td>
                            <td><button type="button">delete</button></td>
                        </tr>
                    {% endfor %}
                   
                    
                </table>
                <button type="button">add</button>
            </div>

            <button type="submit">Export</button>
            
    </form>
    
</body>

<!-- script for autocalculation when numbers change (client side)-->
<script src="/static/client_side_autocompute.js"></script>

<!-- script -->
 <!-- edit data -->

<script>

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== ''){
            const cookies = document.cookie.split(';');
            for (let cookie of cookies){
                cookie = cookie.trim();
                if (cookie.startsWith(name + '=')){
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // autosave for contenteditable cells with class= "selected_cell" -only for single fields (table not included)
    document.addEventListener('DOMContentLoaded', function() {

        const selected_cell = document.querySelectorAll(".selected_cell");

        selected_cell.forEach(cell => {

            cell.addEventListener("blur", function() {

                const field = this.dataset.field;
                const value = this.value === "" ? 0 : (this.value ?? this.textContent);
                const id = this.dataset.id; 
                const csrftoken = getCookie('csrftoken');

                console.log("field:", field);
                console.log("value:", value);

                // fetch to Django
                fetch("{% url 'update_individual_quotation' %}", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": csrftoken
                    },
                    body: JSON.stringify({
                        id: id,
                        field: field,
                        value: value
                    })
                })
                .then(response => response.json())
                .then(data => {
                    console.log("Server response:", data);
                })
                .catch(error => console.error("Error:", error));

            });

        });

    });

    document.addEventListener('DOMContentLoaded', function() {
    // table autosave for editable cells and inputs
    const tableCells = document.querySelectorAll(".table_edit_item");

    tableCells.forEach(cell => {
        cell.addEventListener("blur", function() {
            const field = this.dataset.field;
            const value = this.value !== undefined ? this.value : this.textContent;
            const id = this.closest("tr").dataset.id;
            const csrftoken = getCookie('csrftoken');

            console.log("table update:", field, value, id);

            fetch("{% url 'update_item' %}", {
                method: "POST",
                headers:{
                    "Content-Type":"application/json",
                    "X-CSRFToken": csrftoken
                },
                body: JSON.stringify({
                    id: id,
                    field: field,
                    value: value
                })
            })
            .then(r => r.json())
            .then(data => console.log(data))
            .catch(err => console.error(err));
        });
    });
});

</script>
</html>
